      API_KEY: ${{ secrets.API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use API Key
        run: echo "Using secret safely"
        env:
          API_KEY: ${{ secrets.API_KEY }}
